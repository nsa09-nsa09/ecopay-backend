name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  IMAGE: ghcr.io/nsa09-nsa09/ecopay-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: ./mvnw -B verify

  build-push:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # main -> :latest (prod),  dev -> :dev (dev environment)
      - name: Compute moving tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "moving=latest" >> "$GITHUB_OUTPUT"
          else
            echo "moving=dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.moving }}
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      # main -> "backend" (prod service),  dev -> "backend-dev"
      - name: Compute target service
        id: svc
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=backend" >> "$GITHUB_OUTPUT"
          else
            echo "name=backend-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/ecopay
            docker compose pull ${{ steps.svc.outputs.name }}
            docker compose up -d ${{ steps.svc.outputs.name }}
            docker image prune -f
