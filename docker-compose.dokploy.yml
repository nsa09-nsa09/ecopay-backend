services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in Dokploy Environment}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in Dokploy Environment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in Dokploy Environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dokploy-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL must be set in Dokploy Environment}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME must be set in Dokploy Environment}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set in Dokploy Environment}
      SPRING_FLYWAY_URL: ${SPRING_FLYWAY_URL:?SPRING_FLYWAY_URL must be set in Dokploy Environment}
      SPRING_FLYWAY_USER: ${SPRING_FLYWAY_USER:?SPRING_FLYWAY_USER must be set in Dokploy Environment}
      SPRING_FLYWAY_PASSWORD: ${SPRING_FLYWAY_PASSWORD:?SPRING_FLYWAY_PASSWORD must be set in Dokploy Environment}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in Dokploy Environment}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      APP_SECURITY_FIELD_ENCRYPTION_KEY: ${APP_SECURITY_FIELD_ENCRYPTION_KEY:?APP_SECURITY_FIELD_ENCRYPTION_KEY must be set in Dokploy Environment}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS must be set in Dokploy Environment}
      APP_RATE_LIMIT_LOGIN_ATTEMPTS: ${APP_RATE_LIMIT_LOGIN_ATTEMPTS:-5}
      APP_RATE_LIMIT_LOGIN_DURATION_MINUTES: ${APP_RATE_LIMIT_LOGIN_DURATION_MINUTES:-15}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - dokploy-network

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
