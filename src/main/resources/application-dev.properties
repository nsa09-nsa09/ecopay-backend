logging.level.kz.hrms.splitupauth=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=DEBUG

# Dev: default to the in-memory mock payment gateway (no real Freedom Pay
# credentials needed). Set PAYMENTS_PROVIDER=freedompay in the environment to
# run real Freedom Pay sandbox transactions (requires FREEDOMPAY_MERCHANT_ID /
# FREEDOMPAY_SECRET_KEY to be set).
ecopay.payments.provider=${PAYMENTS_PROVIDER:mock}

# Dev/test only: master phone-verification code (real SMS codes are only logged in dev).
app.phone.dev-bypass-code=000000

# Dev/test only: auto-verify email on registration so login works without SMTP.
app.dev.auto-verify-email=true