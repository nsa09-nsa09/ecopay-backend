spring.application.name=split-up-auth
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.security.field-encryption-key=${APP_SECURITY_FIELD_ENCRYPTION_KEY}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${MAIL_USERNAME}

app.rate-limit.login.attempts=${APP_RATE_LIMIT_LOGIN_ATTEMPTS:5}
app.rate-limit.login.duration-minutes=${APP_RATE_LIMIT_LOGIN_DURATION_MINUTES:15}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Freedom Pay payment gateway
ecopay.payments.freedompay.base-url=${FREEDOMPAY_BASE_URL:https://test-api.freedompay.kz}
ecopay.payments.freedompay.merchant-id=${FREEDOMPAY_MERCHANT_ID:}
ecopay.payments.freedompay.secret-key=${FREEDOMPAY_SECRET_KEY:}
ecopay.payments.freedompay.payout-secret-key=${FREEDOMPAY_PAYOUT_SECRET_KEY:}
ecopay.payments.freedompay.result-url=${FREEDOMPAY_RESULT_URL:http://localhost:8080/api/v1/webhooks/freedompay/result}
ecopay.payments.freedompay.payout-result-url=${FREEDOMPAY_PAYOUT_RESULT_URL:http://localhost:8080/api/v1/webhooks/freedompay/payout-result}
ecopay.payments.freedompay.success-url=${FREEDOMPAY_SUCCESS_URL:http://localhost:5173/payment/confirmation}
ecopay.payments.freedompay.failure-url=${FREEDOMPAY_FAILURE_URL:http://localhost:5173/payment/failure}
ecopay.payments.freedompay.test-mode=${FREEDOMPAY_TEST_MODE:1}

# Platform fee percentage
app.platform.fee-percent=${APP_PLATFORM_FEE_PERCENT:8}

# SMS provider
ecopay.sms.provider=${SMS_PROVIDER:logging}
ecopay.sms.mobizon.api-key=${MOBIZON_API_KEY:}
ecopay.sms.mobizon.from=${MOBIZON_FROM:Ecopay}
app.sms.code-ttl-seconds=${APP_SMS_CODE_TTL_SECONDS:300}
app.sms.resend-cooldown-seconds=${APP_SMS_RESEND_COOLDOWN_SECONDS:60}
app.sms.max-attempts-per-hour=${APP_SMS_MAX_ATTEMPTS_PER_HOUR:3}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha